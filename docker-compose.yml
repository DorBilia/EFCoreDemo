services:
  postgres:
    image: postgres:16
    container_name: efcore_postgres
    restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: appdb
    ports:
      - "5544:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: